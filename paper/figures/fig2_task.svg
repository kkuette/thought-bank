<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 470" font-family="Helvetica, Arial, sans-serif">
  <!-- palette: ink #263238, present #1565c0, query #607d8b, switch #c62828, bank #ef6c00, read #2e7d32 -->

  <text x="520" y="30" font-size="15" fill="#263238" text-anchor="middle" font-weight="bold">one conversation of the keyed fresh-rule benchmark (K = 2)</text>

  <!-- ======================= segment strip ======================= -->
  <!-- presentation A -->
  <rect x="20" y="60" width="104" height="78" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="72" y="82" font-size="12.5" fill="#1565c0" text-anchor="middle" font-weight="bold">present A</text>
  <text x="72" y="100" font-size="11" fill="#263238" text-anchor="middle">[A, x0,y0 &#8230; x5,y5]</text>
  <text x="72" y="116" font-size="11" fill="#263238" text-anchor="middle">rule sA: 6 pairs,</text>
  <text x="72" y="130" font-size="11" fill="#263238" text-anchor="middle">13 tokens</text>

  <!-- presentation B -->
  <rect x="132" y="60" width="104" height="78" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="184" y="82" font-size="12.5" fill="#1565c0" text-anchor="middle" font-weight="bold">present B</text>
  <text x="184" y="100" font-size="11" fill="#263238" text-anchor="middle">[B, x0,y0 &#8230; x5,y5]</text>
  <text x="184" y="116" font-size="11" fill="#263238" text-anchor="middle">rule sB</text>

  <!-- query A -->
  <rect x="244" y="60" width="104" height="78" rx="8" fill="#f5f7f8" stroke="#607d8b" stroke-width="1.6"/>
  <text x="296" y="82" font-size="12.5" fill="#455a64" text-anchor="middle" font-weight="bold">query A</text>
  <text x="296" y="100" font-size="11" fill="#263238" text-anchor="middle">[A, x?]</text>
  <text x="296" y="116" font-size="11" fill="#263238" text-anchor="middle">x? unseen in the</text>
  <text x="296" y="130" font-size="11" fill="#263238" text-anchor="middle">presentation</text>

  <!-- query B -->
  <rect x="356" y="60" width="104" height="78" rx="8" fill="#f5f7f8" stroke="#607d8b" stroke-width="1.6"/>
  <text x="408" y="82" font-size="12.5" fill="#455a64" text-anchor="middle" font-weight="bold">query B</text>
  <text x="408" y="100" font-size="11" fill="#263238" text-anchor="middle">[B, x?]</text>
  <text x="408" y="118" font-size="11" fill="#2e7d32" text-anchor="middle">&#8594; (x? + sB)</text>
  <text x="408" y="132" font-size="11" fill="#2e7d32" text-anchor="middle">mod 128</text>

  <!-- dots -->
  <text x="492" y="105" font-size="20" fill="#607d8b" text-anchor="middle">&#8230;</text>

  <!-- switch -->
  <rect x="524" y="60" width="112" height="78" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2.4"/>
  <text x="580" y="82" font-size="12.5" fill="#c62828" text-anchor="middle" font-weight="bold">switch: re-present A</text>
  <text x="580" y="100" font-size="11" fill="#263238" text-anchor="middle">new rule sA' &#8800; sA</text>
  <text x="580" y="116" font-size="11" fill="#c62828" text-anchor="middle">one 13-token forward</text>
  <text x="580" y="130" font-size="11" fill="#c62828" text-anchor="middle">on the dirty bank</text>

  <!-- query A post-switch -->
  <rect x="644" y="60" width="104" height="78" rx="8" fill="#f5f7f8" stroke="#607d8b" stroke-width="1.6"/>
  <text x="696" y="82" font-size="12.5" fill="#455a64" text-anchor="middle" font-weight="bold">query A</text>
  <text x="696" y="100" font-size="11" fill="#263238" text-anchor="middle">[A, x?]</text>
  <text x="696" y="118" font-size="11" fill="#2e7d32" text-anchor="middle">&#8594; follows sA'</text>
  <text x="696" y="132" font-size="11" fill="#c62828" text-anchor="middle">old rule: 0.000</text>

  <!-- query B post-switch -->
  <rect x="756" y="60" width="104" height="78" rx="8" fill="#f5f7f8" stroke="#607d8b" stroke-width="1.6"/>
  <text x="808" y="82" font-size="12.5" fill="#455a64" text-anchor="middle" font-weight="bold">query B</text>
  <text x="808" y="100" font-size="11" fill="#263238" text-anchor="middle">[B, x?]</text>
  <text x="808" y="118" font-size="11" fill="#2e7d32" text-anchor="middle">&#8594; sB intact</text>

  <!-- dots end -->
  <text x="892" y="105" font-size="20" fill="#607d8b" text-anchor="middle">&#8230;</text>

  <!-- window annotation around query A -->
  <rect x="238" y="50" width="116" height="98" rx="10" fill="none" stroke="#263238" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="296" y="42" font-size="11" fill="#263238" text-anchor="middle">one window per segment</text>

  <!-- 8-16 turns annotation -->
  <text x="940" y="92" font-size="11" fill="#607d8b">8&#8211;16 turns,</text>
  <text x="940" y="107" font-size="11" fill="#607d8b">0&#8211;2 switches</text>
  <text x="940" y="122" font-size="11" fill="#607d8b">at random</text>
  <text x="940" y="137" font-size="11" fill="#607d8b">positions</text>

  <!-- ======================= write / read arrows ======================= -->
  <!-- writes (blue, down) from every segment -->
  <g stroke="#1565c0" stroke-width="1.8" fill="none">
    <line x1="60" y1="138" x2="60" y2="216"/>
    <line x1="172" y1="138" x2="172" y2="216"/>
    <line x1="284" y1="138" x2="284" y2="216"/>
    <line x1="396" y1="138" x2="396" y2="216"/>
    <line x1="568" y1="138" x2="568" y2="216"/>
    <line x1="684" y1="138" x2="684" y2="216"/>
    <line x1="796" y1="138" x2="796" y2="216"/>
  </g>
  <g fill="#1565c0">
    <polygon points="60,222 55,212 65,212"/>
    <polygon points="172,222 167,212 177,212"/>
    <polygon points="284,222 279,212 289,212"/>
    <polygon points="396,222 391,212 401,212"/>
    <polygon points="568,222 563,212 573,212"/>
    <polygon points="684,222 679,212 689,212"/>
    <polygon points="796,222 791,212 801,212"/>
  </g>
  <text x="36" y="180" font-size="10.5" fill="#1565c0" text-anchor="end" transform="rotate(-90 36 180)"></text>
  <text x="52" y="175" font-size="10.5" fill="#1565c0" text-anchor="end">write</text>

  <!-- reads (green, up) into every query -->
  <g stroke="#2e7d32" stroke-width="1.8" fill="none">
    <line x1="308" y1="216" x2="308" y2="144"/>
    <line x1="420" y1="216" x2="420" y2="144"/>
    <line x1="708" y1="216" x2="708" y2="144"/>
    <line x1="820" y1="216" x2="820" y2="144"/>
  </g>
  <g fill="#2e7d32">
    <polygon points="308,138 303,148 313,148"/>
    <polygon points="420,138 415,148 425,148"/>
    <polygon points="708,138 703,148 713,148"/>
    <polygon points="820,138 815,148 825,148"/>
  </g>
  <text x="330" y="175" font-size="10.5" fill="#2e7d32">read</text>

  <!-- ======================= bank band ======================= -->
  <rect x="20" y="222" width="960" height="52" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="500" y="244" font-size="13.5" fill="#ef6c00" text-anchor="middle" font-weight="bold">thought bank &#8212; 8 slots, FIFO, carried across all segments</text>
  <text x="500" y="262" font-size="11.5" fill="#ef6c00" text-anchor="middle">the ONLY path between segments (bank ablated &#8594; chance = 0.008 everywhere) &#8212; up to 20 writes into 8 slots: retention must survive eviction</text>

  <!-- ======================= bottom notes ======================= -->
  <g font-size="12" fill="#263238">
    <text x="30" y="310" font-weight="bold">rule family</text>
    <text x="30" y="328">y = (x + s) mod 128, one fresh offset s</text>
    <text x="30" y="344">per key per conversation</text>

    <text x="370" y="310" font-weight="bold">train / held split on s</text>
    <text x="370" y="328">multiples of 8 (15 rules) never trained;</text>
    <text x="370" y="344">a held rule at test = a never-trained binding</text>
    <text x="370" y="360">inside the meta-learned family</text>

    <text x="720" y="310" font-weight="bold">what makes it memory</text>
    <text x="720" y="328">information shown once, used many turns</text>
    <text x="720" y="344">later, never resolvable from the current</text>
    <text x="720" y="360">window; queries use unseen x &#8594; the</text>
    <text x="720" y="376">binding must generalize, not be recalled</text>
  </g>

  <g font-size="11" fill="#607d8b">
    <text x="30" y="420">structure randomization (the policy trainer): length ~ U[8,16], up to two switches at random positions &#8212; a random key is re-presented with a new rule on the carried bank.</text>
    <text x="30" y="438">&#167;8 shows this distribution, and nothing architectural, is what installs the memory policy (keep / overwrite / write-on-dirty).</text>
  </g>
</svg>
