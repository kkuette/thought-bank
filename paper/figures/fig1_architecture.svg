<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 580" font-family="Helvetica, Arial, sans-serif">
  <!-- ======================= styles ======================= -->
  <!-- ink #263238, write #1565c0, read #2e7d32, bank #ef6c00 -->

  <!-- ======================= trunk column ======================= -->
  <text x="150" y="112" font-size="12" fill="#607d8b" text-anchor="middle">MLA-style compressed sparse attention</text>
  <text x="150" y="127" font-size="12" fill="#607d8b" text-anchor="middle">DeepSeekMoE FFN &#183; hyper-connections</text>

  <rect x="60" y="140" width="180" height="44" rx="8" fill="#eceff1" stroke="#263238" stroke-width="1.5"/>
  <text x="150" y="167" font-size="15" fill="#263238" text-anchor="middle">block 3</text>

  <rect x="60" y="204" width="180" height="44" rx="8" fill="#eceff1" stroke="#263238" stroke-width="1.5"/>
  <text x="150" y="231" font-size="15" fill="#263238" text-anchor="middle">block 2</text>

  <rect x="60" y="268" width="180" height="44" rx="8" fill="#eceff1" stroke="#263238" stroke-width="1.5"/>
  <text x="150" y="295" font-size="15" fill="#263238" text-anchor="middle">block 1</text>

  <rect x="60" y="332" width="180" height="44" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="150" y="351" font-size="15" fill="#263238" text-anchor="middle">block 0</text>
  <text x="150" y="368" font-size="12" fill="#2e7d32" text-anchor="middle">+ fast-weight read</text>

  <rect x="60" y="396" width="180" height="44" rx="8" fill="#eceff1" stroke="#263238" stroke-width="1.5"/>
  <text x="150" y="423" font-size="15" fill="#263238" text-anchor="middle">embed</text>

  <rect x="60" y="460" width="180" height="52" rx="8" fill="#ffffff" stroke="#263238" stroke-width="1.5"/>
  <text x="150" y="481" font-size="13" fill="#263238" text-anchor="middle">segment tokens</text>
  <text x="150" y="499" font-size="13" fill="#263238" text-anchor="middle">[key, x0, y0, &#8230;]</text>

  <!-- upward arrows through the trunk -->
  <line x1="150" y1="460" x2="150" y2="446" stroke="#263238" stroke-width="1.8"/>
  <polygon points="150,442 145,452 155,452" fill="#263238"/>
  <line x1="150" y1="396" x2="150" y2="382" stroke="#263238" stroke-width="1.8"/>
  <polygon points="150,378 145,388 155,388" fill="#263238"/>
  <line x1="150" y1="332" x2="150" y2="318" stroke="#263238" stroke-width="1.8"/>
  <polygon points="150,314 145,324 155,324" fill="#263238"/>
  <line x1="150" y1="268" x2="150" y2="254" stroke="#263238" stroke-width="1.8"/>
  <polygon points="150,250 145,260 155,260" fill="#263238"/>
  <line x1="150" y1="204" x2="150" y2="190" stroke="#263238" stroke-width="1.8"/>
  <polygon points="150,186 145,196 155,196" fill="#263238"/>

  <!-- ======================= write path (blue) ======================= -->
  <rect x="380" y="52" width="200" height="52" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="480" y="73" font-size="14" fill="#263238" text-anchor="middle">write head</text>
  <text x="480" y="91" font-size="12" fill="#1565c0" text-anchor="middle">mean-pool &#8594; proj (32 d)</text>

  <!-- block3 -> write head -->
  <path d="M 240 150 C 300 110, 330 90, 372 81" fill="none" stroke="#1565c0" stroke-width="2"/>
  <polygon points="380,79 368,77 371,88" fill="#1565c0"/>
  <text x="268" y="92" font-size="11.5" fill="#1565c0">final hidden states</text>
  <text x="268" y="106" font-size="11.5" fill="#1565c0">(end of segment)</text>

  <!-- write head -> bank -->
  <path d="M 580 78 C 660 78, 700 110, 764 152" fill="none" stroke="#1565c0" stroke-width="2"/>
  <polygon points="770,157 758,153 764,144" fill="#1565c0"/>
  <text x="676" y="72" font-size="11.5" fill="#1565c0" text-anchor="middle">one vector per segment,</text>
  <text x="676" y="86" font-size="11.5" fill="#1565c0" text-anchor="middle">appended FIFO</text>

  <!-- ======================= bank (amber) ======================= -->
  <text x="830" y="130" font-size="14" fill="#ef6c00" text-anchor="middle" font-weight="bold">thought bank &#8212; 8 slots &#215; 32 d</text>
  <text x="830" y="147" font-size="11.5" fill="#ef6c00" text-anchor="middle">persistent state, carried across segments (TBPTT in training)</text>

  <g stroke="#ef6c00" stroke-width="1.8" fill="#fff3e0">
    <rect x="662" y="160" width="38" height="56" rx="5"/>
    <rect x="704" y="160" width="38" height="56" rx="5"/>
    <rect x="746" y="160" width="38" height="56" rx="5"/>
    <rect x="788" y="160" width="38" height="56" rx="5"/>
    <rect x="830" y="160" width="38" height="56" rx="5"/>
    <rect x="872" y="160" width="38" height="56" rx="5"/>
    <rect x="914" y="160" width="38" height="56" rx="5"/>
    <rect x="956" y="160" width="38" height="56" rx="5"/>
  </g>
  <g font-size="12" fill="#263238" text-anchor="middle">
    <text x="681" y="193">m1</text>
    <text x="723" y="193">m2</text>
    <text x="765" y="193">m3</text>
    <text x="807" y="193">m4</text>
    <text x="849" y="193">m5</text>
    <text x="891" y="193">m6</text>
    <text x="933" y="193">m7</text>
    <text x="975" y="193">m8</text>
  </g>

  <!-- evict oldest (dashed, out of slot 1) -->
  <path d="M 681 160 C 681 128, 650 122, 630 122" fill="none" stroke="#ef6c00" stroke-width="1.6" stroke-dasharray="5,4"/>
  <polygon points="624,122 634,117 634,127" fill="#ef6c00"/>
  <text x="618" y="112" font-size="11" fill="#ef6c00" text-anchor="end">evict oldest</text>

  <!-- ======================= read path (green) ======================= -->
  <!-- every slot feeds the hypernet: fan-in from bank bottom -->
  <g stroke="#2e7d32" stroke-width="1.4" fill="none" opacity="0.55">
    <path d="M 681 216 C 681 252, 700 268, 716 276"/>
    <path d="M 765 216 C 765 246, 762 260, 748 274"/>
    <path d="M 849 216 C 849 246, 815 262, 780 274"/>
    <path d="M 975 216 C 975 256, 880 270, 812 277"/>
  </g>
  <text x="985" y="248" font-size="11" fill="#2e7d32">each slot,</text>
  <text x="985" y="262" font-size="11" fill="#2e7d32">sequentially</text>

  <rect x="620" y="278" width="190" height="54" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="715" y="299" font-size="14" fill="#263238" text-anchor="middle">hypernet</text>
  <text x="715" y="318" font-size="12" fill="#2e7d32" text-anchor="middle">mi &#8594; (Ai, Bi),  r = 16</text>

  <line x1="810" y1="305" x2="836" y2="305" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="842,305 831,300 831,310" fill="#2e7d32"/>

  <rect x="844" y="278" width="186" height="54" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="937" y="299" font-size="13" fill="#263238" text-anchor="middle">per-slot low-rank MLP</text>
  <text x="937" y="318" font-size="12" fill="#2e7d32" text-anchor="middle">y &#8592; y + Bi &#963;(Ai y)</text>

  <!-- generated layer applied to block 0 -->
  <path d="M 900 332 C 850 420, 500 452, 250 380" fill="none" stroke="#2e7d32" stroke-width="2.2"/>
  <polygon points="243,378 255,375 251,386" fill="#2e7d32"/>
  <text x="560" y="452" font-size="12.5" fill="#2e7d32" text-anchor="middle">residual delta at block 0:   h &#8592; h + W0(y &#8722; y0)</text>
  <text x="560" y="470" font-size="11.5" fill="#2e7d32" text-anchor="middle" font-style="italic">the bank is read as weights &#8212; never attended as data</text>

  <!-- ======================= legend ======================= -->
  <g font-size="11.5">
    <line x1="640" y1="530" x2="668" y2="530" stroke="#1565c0" stroke-width="2.5"/>
    <text x="674" y="534" fill="#263238">write: one forward pass per segment</text>
    <line x1="640" y1="552" x2="668" y2="552" stroke="#2e7d32" stroke-width="2.5"/>
    <text x="674" y="556" fill="#263238">read: slots expanded into fast weights</text>
  </g>
  <g font-size="11.5">
    <rect x="60" y="524" width="16" height="12" fill="#fff3e0" stroke="#ef6c00" stroke-width="1.5"/>
    <text x="84" y="534" fill="#263238">the only state crossing segment boundaries &#8212; no backward,</text>
    <text x="84" y="552" fill="#263238">no optimizer, no weight copy at inference</text>
  </g>
</svg>
