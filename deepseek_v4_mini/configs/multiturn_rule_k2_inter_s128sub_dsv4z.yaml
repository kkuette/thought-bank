# dsv4z — dsv4y CURRICULUM ABLATION: full pool from step 0.
#
# Question (user, 2026-07-07, asked mid-dsv4y): the mastery ramp (16->112)
# was designed to bootstrap the read from scratch — is it still needed for
# family transfer on an ORGANIZED circuit? Single diff vs dsv4y:
# curriculum OFF (full 112-rule train pool from step 0). Same base ckpt
# (dsv4w_s43@4000), same family (subtraction a=127), teacher-free, same
# LR recipe, same 2000 steps, same seed.
#
# dsv4y reference trajectory (with ramp): lift-off @200, ref-0.13 crossed
# @500, plateau ~0.25 from 1000 on; final 0.255/0.255 train=held.
# Reads:
#   - matches/beats dsv4y -> the ramp is a from-scratch artifact; transfer
#     claim simplifies to "warm restart + data of the new family".
#   - stalls at chance -> the ramp is load-bearing even warm: diversity
#     shock re-creates the ignore-bank basin (curriculum = the cheap kick).
#   - same 0.25 plateau either way -> plateau is structural, not a
#     curriculum artifact (feeds the 1-read-per-4-blocks suspicion).
