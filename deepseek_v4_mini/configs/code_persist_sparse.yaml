# Persistent bank (= code_persist.yaml) PLUS a sparsity budget on the write
# decision α. In code_persist.yaml the write gate saturates at α=1.000 — the model
# writes every segment, so the write/skip choice decides nothing. mem_write_cost
# adds cost · E[-log(1-α)] to the loss: writing now has an opportunity cost, so the
# model must learn WHEN a thought is worth committing instead of always writing.
#
# A/B baseline = code_persist.yaml (mem_write_cost=0). Success = α drops below 1 and
# becomes selective while persist_gap holds ≈ +0.30 — i.e. same memory benefit with
# fewer, more useful writes. Watch α and wpen in the step log.
#
# python -m deepseek_v4_mini.train deepseek_v4_mini/configs/code_persist_sparse.yaml

# ── Model (identical to code.yaml) ─────────────────────────────────────────────
vocab_size: 50257
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.1
max_seq_len: 512

n_hc: 2
sinkhorn_iters: 20

csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1

n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256

use_thought_memory: true
mem_dim: 32
max_mem: 16

balance_loss_weight: 1.0e-3
mem_write_cost: 0.02          # sparsity budget on α: cost · E[-log(1-α)] per write

# ── Training ──────────────────────────────────────────────────────────────────
training:
  device: auto
  seed: 42
  tokenizer: deepseek-ai/DeepSeek-V3
  lr: 3.0e-4
  muon_lr: 0.003
  weight_decay: 0.1
  steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 64
  mem_bptt_window: 2
  mem_probe_every: 200
  persist_probe_chunks: 6     # persistence probe runs on one >=6-chunk file
  log_every: 50
  save_every: 1000
  save_dir: checkpoints/code_persist_sparse
  run_name: dsv4mini_code_persist_sparse
  tensorboard: false
  metrics_file: runs/dsv4mini_code_persist_sparse/metrics.jsonl

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  name: codeparrot/codeparrot-clean-valid
  text_field: content
  split: train
  seq_len: 512
  batch_size: 8
  persist: true               # ordered per-file lanes + cross-step bank carry
