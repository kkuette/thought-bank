# DeepSeekV4Mini – tiny config (~8M params, CPU/single-GPU experimentation)
# python -m deepseek_v4_mini.train deepseek_v4_mini/configs/tiny.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
vocab_size: 50257        # set automatically from tokenizer; override here if needed
d_model: 128
n_layers: 4              # 2 CSA (layers 0,2) + 2 HCA (layers 1,3)
n_heads: 2
d_head: 32
dropout: 0.1
max_seq_len: 512

# mHC
n_hc: 2
sinkhorn_iters: 3

# Attention
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1

# MoE
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256

# Thought memory
use_thought_memory: true
mem_dim: 32
max_mem: 16

# Auxiliary loss weight
balance_loss_weight: 1.0e-3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  device: auto
  seed: 42
  tokenizer: gpt2
  lr: 3.0e-4
  weight_decay: 0.1
  steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  precision: bf16        # bf16 | fp16 | fp32
  log_every: 50
  save_every: 1000
  save_dir: checkpoints/tiny
  run_name: dsv4mini_tiny
  tb_dir: runs
  tensorboard: true
  metrics_file: runs/dsv4mini_tiny/metrics.jsonl

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  name: roneneldan/TinyStories
  text_field: text
  split: train
  seq_len: 512
  batch_size: 8
