# TrunkLM – tiny config (~8M params, CPU/single-GPU experimentation)
# python -m deepseek_v4_mini.train deepseek_v4_mini/configs/tiny.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
vocab_size: 50257        # set automatically from tokenizer; override here if needed
d_model: 128
n_layers: 4              # 2 CSA (layers 0,2) + 2 HCA (layers 1,3)
n_heads: 2
d_head: 32
dropout: 0.1
max_seq_len: 512

# mHC
n_hc: 2
sinkhorn_iters: 20      # more Sinkhorn => B closer to doubly-stochastic, ||B||2<=1

# Attention
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1

# MoE
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256

# Thought memory
use_thought_memory: true
mem_dim: 32
max_mem: 16

# Auxiliary loss weight
balance_loss_weight: 1.0e-3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  device: auto
  seed: 42
  tokenizer: deepseek-ai/DeepSeek-V3   # modern ~129k BPE tokenizer
  lr: 3.0e-4
  muon_lr: 0.003         # Muon LR; 0.005 still NaN'd ~step 525 with multi-pass
  weight_decay: 0.1
  steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  precision: bf16        # bf16 | fp16 | fp32
  # Thought-memory training. Multi-pass (TBPTT) is what actually trains the
  # thought stream and fills the bank; without it the bank stays at 1 slot and
  # the write head gets no gradient. 512 / 64 = 8 segments => 8 thought writes
  # per sequence (bank fills to 8; max_mem=16 so no FIFO eviction here).
  mem_segment_len: 64
  mem_bptt_window: 2     # >=2 lets gradient reach the write head (see train.py)
  mem_probe_every: 200   # ablation probe: is the bank lowering CE? + bank stats
  log_every: 50
  save_every: 1000
  save_dir: checkpoints/tiny
  run_name: dsv4mini_tiny
  tb_dir: runs
  tensorboard: true
  metrics_file: runs/dsv4mini_tiny/metrics.jsonl

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  name: roneneldan/TinyStories
  text_field: text
  split: train
  seq_len: 512
  batch_size: 8
