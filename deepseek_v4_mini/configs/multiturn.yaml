# Multi-turn memory: TURN-CADENCED writes instead of every-N-tokens writes.
#
# One conversation = one item; the bank persists across the conversation's turns
# and resets between conversations. The stream is segmented at assistant-turn
# starts (segment = turn), so the bank gets ONE write per turn — a semantic
# boundary — rather than an arbitrary write every mem_segment_len tokens. The
# every-64-tokens cadence is what filled the bank with near-duplicate vectors
# (eff. rank ~1.5/16); writing at turn boundaries should store more distinct
# thoughts. v1 keeps K=1 write/turn and no novelty penalty, to isolate the effect
# of CADENCE alone (compare mt-probe eff_rank / content_gap vs code_persist).
#
# python -m deepseek_v4_mini.train deepseek_v4_mini/configs/multiturn.yaml

# ── Model (same size as code_persist) ──────────────────────────────────────────
vocab_size: 50257            # overridden by the DeepSeek-V3 tokenizer at load
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.1
max_seq_len: 1024

n_hc: 2
sinkhorn_iters: 20

csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1

n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256

use_thought_memory: true
mem_dim: 32
max_mem: 16

balance_loss_weight: 1.0e-3
mem_write_diversity: 0.0     # v1: isolate cadence; raise later for intra-bank diversity

# ── Training ──────────────────────────────────────────────────────────────────
training:
  device: auto
  seed: 42
  tokenizer: deepseek-ai/DeepSeek-V3
  lr: 3.0e-4
  muon_lr: 0.003
  weight_decay: 0.1
  steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0          # 0 => segment by TURN boundaries, not fixed length
  mem_bptt_window: 2
  grad_accum: 8               # batch_size is forced to 1 for multi-turn
  mem_probe_every: 200
  log_every: 50
  save_every: 1000
  save_dir: checkpoints/multiturn
  run_name: dsv4mini_multiturn
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn/metrics.jsonl

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  name: HuggingFaceH4/ultrachat_200k
  task: multiturn
  split: train_sft
  messages_field: messages
  min_turns: 2
  seq_len: 1024               # max conversation length (tokens)
  batch_size: 1
