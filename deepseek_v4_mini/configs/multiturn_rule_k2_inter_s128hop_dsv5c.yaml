# dsv5c — THINK CELL (hop mono-key) warm on dsv5b: the bank as scratchpad.
#
# Design frozen 2026-07-07 (user): the model must EMIT <think> (token 1) when
# it needs compute — learned BY LABELS, not imposed by input format. Hop query
# [k,k,x]: answer label = THINK; the harness grants one scratch segment whose
# sole input is THINK and whose label is f(f(x)). The bank is the only bridge
# (the scratch segment carries nothing about x): forward 1 must WRITE the
# intermediate, forward 2 reads it back and applies the rule again.
#
# Floor (reflection_probe 2026-07-07, s43 & dsv5b): internal trigger 0.000
# absolute, external chain 1.000 -> pure policy gap (STICK/dsv4y twin ->
# expect fast warm training). Teacher-free by design: the Fourier teacher
# codes RULES, not intermediate symbols; a symbol teacher gets built only on
# stall (dsv4y lesson: organized circuits learn policies teacher-free).
# Base dsv5b merge: scratch writes cannot evict the rule codes (late 1.000).
#
# Knobs vs dsv5b config: hop_p 0.3 (standard turns stay majority = n=1
# anchor), hop_grant true, hop_keys 1; init_from dsv5b final; 1500 steps.
# Control arm AFTER this run: hop_grant false (direct f(f(x)) label, no
# granted segment) — must stay at chance or the cell is invalid (n·s
# one-shot shortcut). Offline verdict probe: free emission, bank corruption
# between the two segments, and n=3 with two granted thinks.
vocab_size: 136
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.0
max_seq_len: 64
n_hc: 2
sinkhorn_iters: 20
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256
mem_dim: 32
max_mem: 8
mem_seed_slots: 4
mem_read_rank: 16
mem_read_dropout: 0.0
balance_loss_weight: 0.0001
mem_write_diversity: 0.0
mem_code_mixup_p: 0.0
mem_code_mixup_start: 500
mem_read_swiglu: true
mem_write_gate: false
mem_write_gate_merge: true
mem_write_merge_tau: 0.85
mem_teacher_forcing: false
mem_teacher_fourier: true
mem_teacher_fourier_kmax: 8
mem_teacher_distill_cosine: true
mem_teacher_distill_weight: 2.0
training:
  device: auto
  seed: 43
  lr: 3e-4
  use_muon: true
  lr_schedule: wsd
  wsd_decay_start: 1100
  wsd_decay_at_anneal_end: false
  wsd_decay_offset: 800
  wsd_decay_on_plateau: true
  wsd_plateau_delta: 0.05
  wsd_plateau_patience: 300
  teacher_lr: 3e-4
  muon_lr: 0.00375
  weight_decay: 0.1
  muon_rms_match: true
  adam_eps: 1.0e-20
  steps: 1500
  warmup_steps: 0
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0
  mem_bptt_window: 20
  grad_accum: 10
  mem_probe_every: 100
  log_every: 50
  save_every: 100
  save_dir: checkpoints/multiturn_rule_k2_inter_s128hop_dsv5c
  run_name: dsv4mini_multiturn_rule_k2_inter_s128hop_dsv5c
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn_rule_k2_inter_s128hop_dsv5c/metrics.jsonl
  init_from: checkpoints/multiturn_rule_k2_inter_s128structmerge_dsv5b/final.pt
data:
  task: multiturn_rule
  n_symbols: 128
  n_examples: 6
  turns_per_conv: 8
  turns_range:
  - 8
  - 16
  switch_phase_min: 4
  switch_phase_max: 12
  n_contexts: 2
  rule_family: affine
  affine_units:
  - 1
  heldout_rule_mod: 8
  batch_size: 64
  curriculum_rules_start: 0
  switch_max: 2
  hop_p: 0.3
  hop_grant: true
  hop_keys: 1
mem_read_spectral_norm: false
mem_read_layers:
- 0
