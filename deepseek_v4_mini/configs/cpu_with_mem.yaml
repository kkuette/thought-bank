# DeepSeekV4Mini – CPU smoke-test, WITH memory bank
vocab_size: 50257
d_model: 64
n_layers: 2
n_heads: 2
d_head: 16
dropout: 0.0
max_seq_len: 128

n_hc: 2
sinkhorn_iters: 5

csa_m: 4
hca_m: 8
top_k_csa: 2
n_win: 4
d_latent_q: 16
n_groups: 1

n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 128

use_dual_stream: true
use_thought_memory: false
mem_dim: 32
max_mem: 8
consolidate_k: 2
n_mem_layers: 1
mem_n_heads: 1
mem_d_head: 16
mem_d_latent_q: 16
mem_csa_m: 2
mem_hca_m: 4
mem_top_k: 2
mem_n_win: 2
mem_n_experts: 2
mem_n_shared: 1
mem_top_k_experts: 1
mem_d_ff: 32

balance_loss_weight: 1.0e-3

training:
  device: cpu
  seed: 42
  tokenizer: deepseek-ai/DeepSeek-V3   # modern ~129k BPE tokenizer
  lr: 3.0e-4
  muon_lr: 0.02
  weight_decay: 0.1
  steps: 200
  warmup_steps: 20
  grad_clip: 1.0
  precision: fp32
  log_every: 20
  save_every: 0
  save_dir: checkpoints/cpu_with_mem
  run_name: cpu_with_mem
  tb_dir: runs
  tensorboard: false
  metrics_file: runs/cpu_with_mem/metrics.jsonl

data:
  name: roneneldan/TinyStories
  text_field: text
  split: train
  seq_len: 64
  batch_size: 2
