# dsv4l — READ GRAFT: warm-restart dsv4i@2400, bank added to ALL 4 blocks.
#
# dsv4j (4-block read FROM SCRATCH) stalled at stage 16 with CE ABOVE the chance
# floor: four injection points feeding an unorganized code poison the trunk
# during bootstrap. Same lesson as the teacher: ORGANIZE FIRST, EXTEND AFTER.
# Here the organized dsv4i circuit (rule_acc 0.27/held 0.28 @2400, single read
# at block 0) is resumed with reads enabled on all 4 blocks; the checkpoint is
# pre-patched (fw_o of blocks 1-3 zeroed) so the new reads are an EXACT no-op
# at step 0 — the read is a residual delta h + fw_o(y-y0) — and gradient grows
# them from zero (LoRA-B-style zero-init graft). Teacher OFF, full 224-rule
# pool, fresh optimizer, decay at 800.
#
# Read (3rd point of the blocks-proportional curve, prediction registered):
#   rule_acc/held rise above the ~0.25-0.28 plateau -> depth-of-application was
#   the ceiling; flat -> ceiling is elsewhere (format/bank); collapse -> the
#   graft destabilizes an organized circuit even from zero.
#
