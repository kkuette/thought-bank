# DeepSeekV4Mini – tiny, NO memory bank
# python -m deepseek_v4_mini.train deepseek_v4_mini/configs/tiny_no_mem.yaml

# ── Model ─────────────────────────────────────────────────────────────────────
vocab_size: 50257
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.1
max_seq_len: 512

# mHC
n_hc: 2
sinkhorn_iters: 3

# Attention
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1

# MoE
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256

# No memory bank
use_dual_stream: false
use_thought_memory: false

balance_loss_weight: 1.0e-3

# ── Training ──────────────────────────────────────────────────────────────────
training:
  device: auto
  seed: 42
  tokenizer: deepseek-ai/DeepSeek-V3   # modern ~129k BPE tokenizer
  lr: 3.0e-4
  weight_decay: 0.1
  steps: 5000
  warmup_steps: 100
  grad_clip: 1.0
  precision: bf16
  log_every: 50
  save_every: 1000
  save_dir: checkpoints/tiny_no_mem
  run_name: dsv4mini_tiny_no_mem
  tb_dir: runs
  tensorboard: true
  metrics_file: runs/dsv4mini_tiny_no_mem/metrics.jsonl

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  name: roneneldan/TinyStories
  text_field: text
  split: train
  seq_len: 512
  batch_size: 8
