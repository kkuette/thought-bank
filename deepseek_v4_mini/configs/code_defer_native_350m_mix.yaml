# dsv6 native ~350M mix — SCALING POINT, phase 0c (47M ragged -> 97M v2b_mix -> 386M this).
# = code_defer_native_350m.yaml backbone + the FULL validated v2b_mix recipe:
#   50/50 codeparrot+fineweb, per-source eval, per-group lr_scale (muon_ref_mem_dim),
#   DeepSeek step decay @700, teacher anneal 300-450 — and amp: true (bf16) so it fits
#   the 3090: est. activations ~7-8 GB/conv bf16 + ~5 GB states => batch 1 x grad_accum 8
#   (same effective 8 convs as 97M B=4xG=2).
# Shape safety vs Muon sqrt(cols): mem_read_rank 16->8 compensates d_model 384->768, so
# read matrices keep their (mem_dim x r*d) shape; only the write sees d_model double,
# which the per-group lr_scale covers. mem_dim/max_mem unchanged = v2b memory verbatim.
# GATE: depth-GAP eval every 200 steps — if bf16 kills the GAP it shows by ~step 600-800;
# kill the run there instead of burning the full ~30h.
#
# python -m deepseek_v4_mini.code_defer_native deepseek_v4_mini/configs/code_defer_native_350m_mix.yaml
tokenizer: HuggingFaceTB/SmolLM2-135M

model:                                     # ThoughtBankConfig -> 386M
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 1536
  mem_dim: 512                             # unchanged from v2b
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 8                         # 16 -> 8: r*d constant across the scale-up
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 1.0e-4

data:
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.5
    stream_cap: 90000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.5
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1                            # 386M: one conv per forward on the 3090
  n_files: 12000                           # 2x v2b: a 386M model eats data faster
  stream_cap: 90000

training:
  seed: 0
  steps: 2000
  grad_accum: 8                            # effective 8 convs/step, as v2b_mix (4x2)
  amp: true                                # bf16 autocast — phase 0c validation
  lr: 3.0e-04
  muon_lr: 7.5e-04
  muon_ref_mem_dim: 64                     # per-group lr_scale: read /2.83, write x2.83
  warmup_steps: 100
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: true
  wsd_floor: 0.0
  wsd_decay_start: 700
  wsd_decay_shape: step                    # x0.316 at 700, x0.1 from 1675
  log_every: 20
  eval_every: 200
  eval_convs: 8
  eval_depths: [2, 4, 6, 8]
  eval_depth_convs: 8
  save_every: 500
  save_dir: checkpoints/code_defer_native_350m_mix
  metrics_file: runs/code_defer_native_350m_mix/metrics.jsonl

teacher:
  enabled: true
  distill_weight: 2.0
  anneal: [300, 450]
