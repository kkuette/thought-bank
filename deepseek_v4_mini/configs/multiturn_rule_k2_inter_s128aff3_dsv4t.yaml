# dsv4t — MULTIPLICATIVE-FAMILY control (symmetric twin of dsv4s).
#
# dsv4s (shift-only through the affine code path) replicated dsv4m step-for-step
# (tiers 259/437/592, anneal [592,892], post-beta=0 climb with held tracking) ->
# machinery cleared. Question (user): can the model learn a MULTIPLICATIVE
# family at all with the dsv4m recipe? Never tested mono-unit at S=128 (affineL
# was 511 rules S=32 old recipe, ceiling ~0.13; r2 was confounded by the mix).
#
# This cell: ONE variable vs dsv4s — affine_units [1] -> [3] (y = 3x+s mod 128,
# 112 train / 15 held, same mod-8 pattern). Reading grid:
#   dsv4t ~ dsv4s (train ->1.0, held tracking)  -> multiplicative family OK,
#     next mixed 112+112 becomes a clean GEOMETRY-INTERFERENCE test;
#   dsv4t stalls (~0.13 affineL-style or worse) -> multiplicative is the wall
#     itself (family complexity vs model size), r2 reframed.
vocab_size: 136
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.0
max_seq_len: 64
n_hc: 2
sinkhorn_iters: 20
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256
mem_dim: 32
max_mem: 16
mem_seed_slots: 4
mem_read_rank: 16
mem_read_dropout: 0.0
balance_loss_weight: 0.0001
mem_write_diversity: 0.0
mem_code_mixup_p: 0.0
mem_code_mixup_start: 500
mem_read_swiglu: true
mem_write_gate: false
mem_teacher_forcing: true
mem_teacher_fourier: true
mem_teacher_fourier_kmax: 8
mem_teacher_distill_cosine: true
mem_teacher_anneal_start: 2600
mem_teacher_anneal_end: 3100
mem_teacher_anneal_len: 300
mem_teacher_distill_weight: 2.0
training:
  device: auto
  seed: 42
  lr: 3e-4
  use_muon: true
  lr_schedule: wsd
  wsd_decay_start: 3000
  wsd_decay_at_anneal_end: true
  wsd_decay_offset: 800
  teacher_lr: 3e-4
  muon_lr: 0.00375
  weight_decay: 0.1
  muon_rms_match: true
  adam_eps: 1.0e-20
  steps: 4000
  warmup_steps: 0
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0
  mem_bptt_window: 10
  grad_accum: 10
  mem_probe_every: 100
  log_every: 50
  save_every: 100
  save_dir: checkpoints/multiturn_rule_k2_inter_s128aff3_dsv4t
  run_name: dsv4mini_multiturn_rule_k2_inter_s128aff3_dsv4t
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn_rule_k2_inter_s128aff3_dsv4t/metrics.jsonl
data:
  task: multiturn_rule
  n_symbols: 128
  n_examples: 6
  turns_per_conv: 8
  n_contexts: 2
  rule_family: affine
  affine_units:
  - 3
  heldout_rule_mod: 8
  batch_size: 64
  curriculum_rules_start: 16
  curriculum_mode: mastery
  curriculum_ce_thresh: 4.3
  curriculum_dwell_min: 150
  curriculum_pool_full_n: 112
  curriculum_anneal_at_n: 64
mem_read_spectral_norm: false
mem_read_layers:
- 0
