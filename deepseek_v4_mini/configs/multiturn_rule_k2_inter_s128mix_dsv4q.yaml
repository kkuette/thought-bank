  adam_eps: 1.0e-20
  steps: 2500
  warmup_steps: 0
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0
  mem_bptt_window: 10
  grad_accum: 10
  mem_probe_every: 100
  log_every: 50
  save_every: 100
  save_dir: checkpoints/multiturn_rule_k2_inter_s128aff_dsv4q
  run_name: dsv4mini_multiturn_rule_k2_inter_s128aff_dsv4q
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn_rule_k2_inter_s128aff_dsv4q/metrics.jsonl
  init_from: checkpoints/multiturn_rule_k2_inter_s128aff_dsv4o2/step_300.pt
  wsd_decay_on_plateau: true
  wsd_plateau_delta: 0.05
  wsd_plateau_patience: 500
data:
