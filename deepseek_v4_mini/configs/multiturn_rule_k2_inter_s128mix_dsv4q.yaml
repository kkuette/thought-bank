# dsv4q — SELECTIVE TEACHER on the new family only (mixed pool, LR/10).
#
# dsv4o2 verdict: LR/10 protects the circuit (shift held hit 0.949 @300, the
# program's best) but the affine family NEVER installs on its own (600+ steps
# at chance) — the trunk finds the bank-free path for the new lanes. The only
# validated installation trigger remains the teacher kick.
#
# This cell: teacher ON, but BLIND on all shift rids (a=1) — the old family is
# pure CE anchor, untouched by blend/distill; the kick applies only to the
# affine lanes. init = dsv4o2/step_300.pt (shift 1.000/0.949). Anneal [800,1300].
# Reading: rule_acc_blind tracks shift survival inline; mixed rule_acc >> 0.33
# with blind intact = the transfer claim; blind eroding = capacity trade-off.
vocab_size: 136
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.0
max_seq_len: 64
n_hc: 2
sinkhorn_iters: 20
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256
mem_dim: 32
