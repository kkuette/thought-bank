# dsv6 native ~350M — SCALING POINT (47M ragged -> 97M v2b -> 386M this).
# LAUNCH AFTER the v2b verdict: same recipe (per-group lr_scale via muon_ref_mem_dim,
# DeepSeek step decay, grad_accum 8, teacher anneal 300-450), only the backbone scales.
# d_model 384->768, n_layers 6->12, mem_read_rank 16->8 (read cost ~ mem_dim*r*d: halved
# rank compensates doubled width; read share drops 59% -> 31% of params). Read at ALL
# blocks, mem_dim/max_mem unchanged — the memory mechanism is the v2b one, verbatim.
# -> 386M params. Est. ~70-90 s/step (fp32) => 2000 steps ~ 2 days on the 3090.
#
# python -m deepseek_v4_mini.code_defer_native deepseek_v4_mini/configs/code_defer_native_350m.yaml
tokenizer: HuggingFaceTB/SmolLM2-135M

model:                                     # ThoughtBankConfig -> 386M
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 1536
  mem_dim: 512                             # unchanged from v2b
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 8                         # 16 -> 8: keeps read budget sane at d768 (120M)
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 1.0e-4

data:
  dataset: codeparrot/codeparrot-clean
  data_dir: ""
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1
  n_files: 12000                           # 2x v2b: a 386M model eats data faster
  stream_cap: 180000

training:
  seed: 0
  steps: 2000
  grad_accum: 8
  amp: false                               # fp32 (sinkhorn); flip to true if VRAM/time demand it
  lr: 3.0e-04
  muon_lr: 7.5e-04
  muon_ref_mem_dim: 64                     # per-group lr_scale: read /2.83, write x2.83
  warmup_steps: 100
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: true
  wsd_floor: 0.0
  wsd_decay_start: 700
  wsd_decay_shape: step                    # x0.316 at 700, x0.1 from 1675
  log_every: 20
  eval_every: 200
  eval_convs: 8
  eval_depths: [2, 4, 6, 8]
  eval_depth_convs: 8
  save_every: 500
  save_dir: checkpoints/code_defer_native_350m
  metrics_file: runs/code_defer_native_350m/metrics.jsonl

teacher:
  enabled: true
  distill_weight: 2.0
  anneal: [300, 450]
