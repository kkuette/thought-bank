# dsv4u — WRITE GATE re-test on the generalizing recipe (claims-audit cell #1).
#
# The gate verdicts ("saturates alpha->1 at no cost, bank polluted", "gate OFF
# speeds decode ~60%") were measured on the MEMORIZING regime; gate has been
# OFF in every teacher-recipe run. The gate is a base-recipe knob, not a claim
# among others: audit everything gate-OFF and discover later that gate changes
# the bank -> redo the audit; auditing 2x (with/without) is out of budget.
# So this cell runs FIRST, before the claims re-audit (user decision).
#
# ONE variable vs dsv4s (which replicated dsv4m step-for-step through the
# affine code path): mem_write_gate false -> true. Same pools 112/15.
# Reading: dsv4u ~ dsv4s (tiers ~259/437/592, anneal ~[592,892], post-beta=0
# climb, held tracking) -> gate harmless on this recipe: freeze gate OFF and
# audit once. Better OR worse -> settle the base first (a result in itself:
# the saturation verdict re-tested on a generalizing model). If tier 16 never
# masters, suspect teacher x gate interaction (the old -60% decode), fallback
# = gate OFF during bootstrap then ON at anneal (2 variables, only if this
# from-scratch cell fails).
vocab_size: 136
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.0
max_seq_len: 64
n_hc: 2
sinkhorn_iters: 20
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256
mem_dim: 32
max_mem: 16
mem_seed_slots: 4
mem_read_rank: 16
mem_read_dropout: 0.0
balance_loss_weight: 0.0001
mem_write_diversity: 0.0
mem_code_mixup_p: 0.0
mem_code_mixup_start: 500
mem_read_swiglu: true
mem_write_gate: true
mem_teacher_forcing: true
mem_teacher_fourier: true
mem_teacher_fourier_kmax: 8
mem_teacher_distill_cosine: true
mem_teacher_anneal_start: 2600
mem_teacher_anneal_end: 3100
mem_teacher_anneal_len: 300   # 500->300 (user, relaunch @121): at S=128 the 64->112 doubling IS the full pool — shorter beta tail trims the taught fraction (rule-count-proportional; answers the "500 is long for 64 rules" objection)
mem_teacher_distill_weight: 2.0
training:
  device: auto
  seed: 42
  lr: 3e-4
  use_muon: true
  lr_schedule: wsd
  wsd_decay_start: 3000
  wsd_decay_at_anneal_end: true
  wsd_decay_offset: 800
  teacher_lr: 3e-4
  muon_lr: 0.00375
  weight_decay: 0.1
  muon_rms_match: true
  adam_eps: 1.0e-20
  steps: 4000
  warmup_steps: 0
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0
  mem_bptt_window: 10
  grad_accum: 10
  mem_probe_every: 100
  log_every: 50
  save_every: 100
  save_dir: checkpoints/multiturn_rule_k2_inter_s128gate_dsv4u
  run_name: dsv4mini_multiturn_rule_k2_inter_s128gate_dsv4u
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn_rule_k2_inter_s128gate_dsv4u/metrics.jsonl
data:
  task: multiturn_rule
  n_symbols: 128
  n_examples: 6
  turns_per_conv: 8
  n_contexts: 2
  rule_family: affine
  affine_units:
  - 1
  heldout_rule_mod: 8
  batch_size: 64
  curriculum_rules_start: 16
  curriculum_mode: mastery
  curriculum_ce_thresh: 4.3
  curriculum_dwell_min: 150
  curriculum_pool_full_n: 112
  curriculum_anneal_at_n: 64
mem_read_spectral_norm: false
mem_read_layers:
- 0
