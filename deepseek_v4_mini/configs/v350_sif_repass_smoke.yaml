# v350_sif_repass_smoke — smoke LOCAL (3090) de la passe SIF continued-pretrain :
# mêmes chemins de code que v350_sif_repass (stream chunks batché + surp_w SIF +
# teacher target surprisal + init release), data = mix smol du cache NFS local,
# 8 steps. Vérifie : table SIF construite, dist [surp] affiché et fini, blend
# actif sur segs chunks, pas de NaN, init 386M chargé.
#   python -m deepseek_v4_mini.code_defer_native \
#     deepseek_v4_mini/configs/v350_sif_repass_smoke.yaml
tokenizer: HuggingFaceTB/SmolLM2-135M

model:                                     # = v350_phase1_10b (386M), inchangé
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 1536
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 8
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 1.0e-4

data:
  cache_dir: /mnt/tb/data_cache
  surprisal_mode: sif
  sif_a: 1.0e-04
  sources:                                 # mix smol local (caches déjà chauds)
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.20
    stream_cap: 90000
  - name: stack_c
    dataset: bigcode/the-stack-smol
    data_dir: data/c
    weight: 0.06
    min_chunks: 2
    stream_cap: 10000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.10
    stream_cap: 250000
  - name: finemath
    dataset: HuggingFaceTB/finemath
    config_name: finemath-4plus
    content_key: text
    min_chunks: 2
    weight: 0.08
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 2                            # 3090 24G, sans grad_checkpoint
  n_files: 800
  stream_cap: 60000

training:
  seed: 0
  steps: 8
  grad_accum: 1
  amp: true
  init_from: /mnt/tb/checkpoints/v350_phase1_release/final.pt
  lr: 1.0e-04
  muon_lr: 2.4e-04
  muon_ref_mem_dim: 64
  warmup_steps: 0
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false
  tf32: true
  grad_checkpoint: false
  skip_final_eval: true
  log_every: 1
  eval_every: 1000
  eval_convs: 2
  eval_depths:
  - 2
  eval_depth_convs: 2
  eval_depth_sources:
  - codeparrot
  save_every: 1000
  save_dir: /mnt/tb/checkpoints/v350_sif_repass_smoke
  metrics_file: /mnt/tb/runs/v350_sif_repass_smoke/metrics.jsonl

teacher:
  enabled: true
  distill_weight: 2.0
  target: surprisal
  anneal:
  - 4
  - 7
