# dsv6 v2c — VAR-CHUNK continued pretrain (RL prerequisite #1, phase 0c side-track).
# init_from the finished v2b_mix 97M: the <think> probe showed the write trigger is
# POSITIONALLY learned (P=.81-.91 exactly at pos 512, zero mid-chunk) — a policy with
# no entropy is untrainable by GRPO (all-identical groups => zero advantage). This run
# re-cuts the SAME cached corpus into chunks of length ~ U[128, 512] (var_chunk) so the
# boundary position stops being predictable; expected outcome = <think> probability
# spreads over plausible boundaries => sampling entropy for the RL groups.
# batch=1 ragged (var chunks can't batch) x grad_accum 8; ~400 steps @ ~18 s/step ~ 2h
# on the 3090 AFTER the 350M run frees it. LR = the post-first-decay plateau of v2b
# (7.5e-4 x 0.316), constant, no teacher (scaffold long dismantled), no decay.
# GATE: depth-GAP eval every 100 steps must STAY positive (var chunks must not cost
# the memory) + re-run the <think> probe on final.pt before any RL.
#
# python -m deepseek_v4_mini.code_defer_native deepseek_v4_mini/configs/code_defer_native_v2c_varlen.yaml
tokenizer: HuggingFaceTB/SmolLM2-135M

model:                                     # = v2b_mix 97M, verbatim (init_from must match)
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 512
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 16
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 1.0e-4

data:                                      # SAME sources/n_files as v2b_mix => cache hit
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.5
    stream_cap: 90000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.5
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1                            # ragged var chunks: batch=1 reference regime
  var_chunk: [128, 512]                    # chunk length ~ U[128, 512] per chunk
  n_files: 6000
  stream_cap: 90000

training:
  seed: 0
  steps: 400
  grad_accum: 8
  amp: false                               # keep the validated fp32 regime at 97M
  init_from: checkpoints/code_defer_native_v2b_mix/final.pt
  lr: 1.0e-04
  muon_lr: 2.4e-04                         # ~ v2b post-first-decay plateau (7.5e-4 x .316)
  muon_ref_mem_dim: 64
  warmup_steps: 20
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false                         # short constant-LR touch-up, no schedule
  log_every: 10
  eval_every: 100
  eval_convs: 8
  eval_depths: [2, 4, 6, 8]
  eval_depth_convs: 8
  save_every: 200
  save_dir: checkpoints/code_defer_native_v2c_varlen
  metrics_file: runs/code_defer_native_v2c_varlen/metrics.jsonl

teacher:
  enabled: false                           # scaffold dismantled since v2b step 450
