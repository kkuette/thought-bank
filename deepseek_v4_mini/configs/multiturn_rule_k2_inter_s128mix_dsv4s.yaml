# dsv4s — SINGLE-FAMILY CONTROL for dsv4r2 (user call: shift alone at 128).
#
# dsv4r2 (56 shift + 56 affine, capacity-matched 112) failed BOTH families —
# even shift never installed, and the forming circuit (affine gap +3.2 under
# teacher) dismantled after beta=0. Three suspects: (1) two-geometry
# interference in mem_dim 32, (2) per-family diversity 56 inside the unknown
# threshold bracket (25,112], (3) anneal pulled too early (~435 vs dsv4m 898).
#
# This cell: affine code path, units [1] ONLY, full s-space, mod-8 held ->
# 112 train / 15 held = dsv4m's exact pools through the NEW machinery.
# Success = machinery + recipe still sound, r2's failure is family count or
# per-family diversity -> next: mixed at FULL per-family diversity 112+112.
# Failure = code-path regression (fourier torus codes / knobs), fix first.
vocab_size: 136
d_model: 128
n_layers: 4
n_heads: 2
d_head: 32
dropout: 0.0
max_seq_len: 64
n_hc: 2
sinkhorn_iters: 20
csa_m: 4
hca_m: 16
top_k_csa: 4
n_win: 8
d_latent_q: 32
n_groups: 1
n_experts: 4
n_shared: 1
top_k_experts: 1
d_ff: 256
mem_dim: 32
max_mem: 16
mem_seed_slots: 4
mem_read_rank: 16
mem_read_dropout: 0.0
balance_loss_weight: 0.0001
mem_write_diversity: 0.0
mem_code_mixup_p: 0.0
mem_code_mixup_start: 500
mem_read_swiglu: true
mem_write_gate: false
mem_teacher_forcing: true
mem_teacher_fourier: true
mem_teacher_fourier_kmax: 8
mem_teacher_distill_cosine: true
mem_teacher_anneal_start: 2600
mem_teacher_anneal_end: 3100
mem_teacher_anneal_len: 300   # 500->300 (user, relaunch @121): at S=128 the 64->112 doubling IS the full pool — shorter beta tail trims the taught fraction (rule-count-proportional; answers the "500 is long for 64 rules" objection)
mem_teacher_distill_weight: 2.0
training:
  device: auto
  seed: 42
  lr: 3e-4
  use_muon: true
  lr_schedule: wsd
  wsd_decay_start: 3000
  wsd_decay_at_anneal_end: true
  wsd_decay_offset: 800
  teacher_lr: 3e-4
  muon_lr: 0.00375
  weight_decay: 0.1
  muon_rms_match: true
  adam_eps: 1.0e-20
  steps: 4000
  warmup_steps: 0
  grad_clip: 1.0
  precision: bf16
  mem_segment_len: 0
  mem_bptt_window: 10
  grad_accum: 10
  mem_probe_every: 100
  log_every: 50
  save_every: 100
  save_dir: checkpoints/multiturn_rule_k2_inter_s128_dsv4s
  run_name: dsv4mini_multiturn_rule_k2_inter_s128_dsv4s
  tensorboard: false
  metrics_file: runs/dsv4mini_multiturn_rule_k2_inter_s128_dsv4s/metrics.jsonl
data:
  task: multiturn_rule
  n_symbols: 128
  n_examples: 6
  turns_per_conv: 8
  n_contexts: 2
  rule_family: affine
  affine_units:
  - 1
  heldout_rule_mod: 8
  batch_size: 64
  curriculum_rules_start: 16
  curriculum_mode: mastery
  curriculum_ce_thresh: 4.3
  curriculum_dwell_min: 150
  curriculum_pool_full_n: 112
  curriculum_anneal_at_n: 64
mem_read_spectral_norm: false
mem_read_layers:
- 0
