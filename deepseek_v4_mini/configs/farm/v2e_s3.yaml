# v2e — INTERLEAVED regime (idea G, user 2026-07-11): each conv = F ~ U[2,4]
# files ("subjects") whose chunks are randomly MIXED in one bank lifetime
# (within-file order kept, defer target = same-file successor). School-style
# spaced practice: more subjects = more spacing between same-thread chunks =
# more selection pressure; F capped by m_total so shallow convs stay coherent.
# No boundaries at all, so the read cannot learn the v2d shortcut "off-topic
# last write => the
# old thread is dead" (v2d probes: distractor-last collapses BELOW reset +0.87,
# vs v2c which survives at -0.96 — a learned boundary inference, not a filter).
# Here mid-file continuations follow off-topic writes at every depth: the only
# winning policy is content-based selection among live threads (trains what the
# cohab probe showed zero-shot: A+B both recoverable, 60/82%).
# Budget matched to v2c/v2d: m_total ~ U[2, K] split across the 2 streams =>
# same chunks/step, same VRAM (~6.4 GB), ~19-20 s/step on 3070Ti.
# Start: v2c_varlen final (step 400), 800 fresh steps (matches v2d's total
# no-reset adaptation budget: 400 on 3090 + 400 farm).
# Verdict: standard evals must hold (GAP >= v2c) + probe battery post-hoc —
# dated prediction: distractor last_xdom cost << v2d's +2.17, worst-case-vs-reset
# back to negative (thread survives), REGISTER d stays low (stale gets discounted),
# recall-by-lag not degraded vs v2c (unlike v2d's uniform -0.3 on code).
tokenizer: HuggingFaceTB/SmolLM2-135M
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 512
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 16
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 0.0001
data:
  cache_dir: /mnt/tb/data_cache
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.5
    stream_cap: 90000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.5
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1
  var_chunk:
  - 128
  - 512
  n_files: 6000
  stream_cap: 90000
training:
  seed: 3
  steps: 800
  grad_accum: 8
  amp: true
  init_from: /mnt/tb/checkpoints/code_defer_native_v2c_varlen/final.pt
  lr: 0.0001
  muon_lr: 0.00024
  muon_ref_mem_dim: 64
  warmup_steps: 20
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false
  log_every: 10
  eval_every: 100
  eval_convs: 8
  eval_depths:
  - 2
  - 4
  - 6
  - 8
  eval_depth_convs: 8
  save_every: 400
  save_dir: /mnt/tb/checkpoints/farm/v2e_s3
  metrics_file: /mnt/tb/runs/farm_v2e_s3/metrics.jsonl
  interleave_files:
  - 2
  - 4
teacher:
  enabled: false
