# v2e_resetcue — B2 : NEUTRALITÉ DES RESETS mesurée (backlog 2026-07-13, le
# standing warning « ne jamais récompenser la rétention » rendu quantitatif —
# la mesure de sécurité qui n'existe nulle part ailleurs).
# Régime v2e strict (entrelacement F~U[2,4], budget identique) + UN ajout :
# 50 % des vies de banque sont ANNONCÉES (marqueur tokenisé <<RESET:SOON>>
# préfixé aux 3 derniers chunks avant le reset), 50 % surprises. AUCUNE perte
# ni reward attachée à l'annonce — on mesure seulement si la politique
# d'écriture réagit (probe resetcue : norme des writes, redondance intra-slots
# = début de rehearsal défensif, CE defer appariée annoncé vs surprise).
# PRÉDICTION (datée 2026-07-13, Fable) : NEUTRE — le reset n'a aucune
# conséquence sur la loss (la vie suivante repart fraîche), donc aucun
# gradient ne pousse vers une écriture défensive : |d| norme < 2 %,
# |d| redondance < 0.02, |d| CE < 0.15 nat (< σ seeds). Le GAP standard doit
# rester ≈ v2e (6.5-6.6 carried). TOUTE dérive (surtout redondance ↑ en
# annoncé) = résultat publiable en soi → FINDINGS + section sécurité du
# dossier. Contrôle : la même probe sur v2e_interleave (jamais vu le marqueur)
# donne le zero-shot du préfixe OOD.
tokenizer: HuggingFaceTB/SmolLM2-135M
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 512
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 16
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 0.0001
data:
  cache_dir: /mnt/tb/data_cache
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.5
    stream_cap: 90000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.5
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1
  var_chunk:
  - 128
  - 512
  n_files: 6000
  stream_cap: 90000
training:
  seed: 0
  steps: 800
  grad_accum: 8
  amp: true
  init_from: /mnt/tb/checkpoints/code_defer_native_v2c_varlen/final.pt
  lr: 0.0001
  muon_lr: 0.00024
  muon_ref_mem_dim: 64
  warmup_steps: 20
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false
  log_every: 10
  eval_every: 100
  eval_convs: 8
  eval_depths:
  - 2
  - 4
  - 6
  - 8
  eval_depth_convs: 8
  save_every: 400
  save_dir: /mnt/tb/checkpoints/farm/v2e_resetcue
  metrics_file: /mnt/tb/runs/farm_v2e_resetcue/metrics.jsonl
  interleave_files:
  - 2
  - 4
  reset_announce: 0.5
  reset_announce_chunks: 3
teacher:
  enabled: false
