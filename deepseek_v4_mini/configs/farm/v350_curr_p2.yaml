# v350_curr_p2 — CURRICULUM 2 PHASES À 97M, PHASE 2 (demande user 2026-07-14) :
# continued-pretrain FULL-STACK depuis la phase 1 batchée (v350_curr_p1),
# précédent v2b_mix -> v2c -> SFT. B=1 + var_chunk + le stack COMPLET du job
# 110 (interleave, no-reset 8, addr+labels, cascade depth 2 map [0,0,0,0,1,2],
# reach stratifié), schedule continued validé (v3_reach : lr 1e-4, muon
# 2.4e-4, warmup 20, 800 steps, pas de decay). Job ferme 116.
# LE VERDICT (vs job 110, FINDINGS 2026-07-14 (2)) : à la fin de la phase 2,
# carried ancres ~= 110 @2000 (grille ±0.15 nat) ET adressage présent
# (label-cue defer NÉGATIF aux probes) => la voie C (coût ÷3) est validée
# SCIENCE, le 350M part en 2 phases. Carried, jamais GAP (règle 4).
# PRÉDICTIONS (2026-07-14, Fable, avant lancement) :
#   1. l'adressage se crée en continued (précédent v2f : 800 steps SFT chaud) —
#      label-cue < 0 net aux probes finales ;
#   2. carried ancres dans ±0.15 de 110 @2000 (code ~6.9, web ~7.5) ;
#   3. page morte (5e strike attendu — le rehearsal joint n'a rien allumé) ;
#   4. risque réel = le PASSAGE chunks fixes -> var_chunk + stack d'un coup :
#      transitoire de loss aux ~50 premiers steps, doit se résorber avant 200.
tokenizer: HuggingFaceTB/SmolLM2-135M
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 512
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 16
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 0.0001
data:
  cache_dir: /mnt/tb/data_cache
  sources:
  # --- identique à v2e_divmix (cache hit garanti avec le job 107)
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.20
    stream_cap: 90000
  - name: stack_c
    dataset: bigcode/the-stack-smol
    data_dir: data/c
    weight: 0.06
    min_chunks: 2
    stream_cap: 10000
  - name: stack_rust
    dataset: bigcode/the-stack-smol
    data_dir: data/rust
    weight: 0.06
    min_chunks: 2
    stream_cap: 10000
  - name: stack_js
    dataset: bigcode/the-stack-smol
    data_dir: data/javascript
    weight: 0.06
    min_chunks: 2
    stream_cap: 10000
  - name: stack_sql
    dataset: bigcode/the-stack-smol
    data_dir: data/sql
    weight: 0.04
    min_chunks: 2
    stream_cap: 10000
  - name: stack_html
    dataset: bigcode/the-stack-smol
    data_dir: data/html
    weight: 0.04
    min_chunks: 2
    stream_cap: 10000
  - name: stack_css
    dataset: bigcode/the-stack-smol
    data_dir: data/css
    weight: 0.04
    min_chunks: 2
    stream_cap: 10000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.10
    stream_cap: 250000
  - name: fineweb_edu
    dataset: HuggingFaceFW/fineweb-edu
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.08
    stream_cap: 250000
  - name: wikipedia
    dataset: wikimedia/wikipedia
    config_name: 20231101.en
    content_key: text
    min_chunks: 2
    weight: 0.08
    stream_cap: 60000
  - name: finemath
    dataset: HuggingFaceTB/finemath
    config_name: finemath-4plus
    content_key: text
    min_chunks: 2
    weight: 0.08
    stream_cap: 250000
  - name: khanacademy
    dataset: HuggingFaceTB/cosmopedia
    config_name: khanacademy
    content_key: text
    min_chunks: 2
    weight: 0.04
    stream_cap: 60000
  - name: openstax
    dataset: HuggingFaceTB/cosmopedia
    config_name: openstax
    content_key: text
    min_chunks: 2
    weight: 0.06
    stream_cap: 60000
  - name: arxiv
    dataset: armanc/scientific_papers
    config_name: arxiv
    content_key: article
    min_chunks: 2
    weight: 0.06
    stream_cap: 60000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1
  var_chunk:
  - 128
  - 512
  n_files: 6000
  stream_cap: 90000
training:
  seed: 0
  steps: 800
  grad_accum: 8
  amp: true
  init_from: /mnt/tb/checkpoints/v350_curr_p1/final.pt
  lr: 0.0001
  muon_lr: 0.00024
  muon_ref_mem_dim: 64
  warmup_steps: 20
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false
  log_every: 10
  eval_every: 100
  eval_convs: 8
  eval_depths:
  - 2
  - 4
  - 6
  - 8
  eval_depth_convs: 8
  eval_depth_sources:
  - codeparrot
  - fineweb
  save_every: 400
  save_dir: /mnt/tb/checkpoints/farm/v350_curr_p2
  metrics_file: /mnt/tb/runs/farm_v350_curr_p2/metrics.jsonl
  interleave_files:
  - 2
  - 4
  addr_prob: 0.5
  addr_label: true
  no_reset_files: 8
  cascade_depth: 2
  cascade_map: [0, 0, 0, 0, 1, 2]
  reach_prob: 0.35
  reach_max: 2
teacher:
  enabled: false
