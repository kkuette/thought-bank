# v2e_md256 — B1 TAPER ENTRAÎNÉ, bras 256 (promotion backlog 2026-07-13).
# Question : un read à mem_dim réduit coûte-t-il quelque chose quand le reste
# est apparié ? Justifie le taper 512→256→128 des blocs profonds v3.
# Régime v2e (entrelacement G) à l'identique, mem_dim 256, init v2b_md256_s4
# (seul checkpoint md256 disponible ; init v2c IMPOSSIBLE, mem_dim différent).
# muon_ref_mem_dim INCHANGÉ 64 (piège Muon √cols géré par lr_scale par groupe,
# cf. FINDINGS v2b_mix). CAVEAT apparillage : init s4/régime v2b vs v2e_512
# init v2c/seed 0 — la comparaison est à budget POST-INIT égal (800 steps),
# bruit de seed non contrôlé sur ce point (le bras md128 suivra quand
# v2b_md128_s4 aura fini, même recette).
# PRÉDICTION (datée 2026-07-13, Fable) : carried md256 ≈ md512 à ±0.15 nat
# (la grille v2b montre md256 compétitif) ; VERT => le taper des profonds est
# gratuit, la VRAM 350M se calcule avec 512/256/128. Comparaison CARRIED,
# jamais GAP (règle 4).
tokenizer: HuggingFaceTB/SmolLM2-135M
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 512
  mem_dim: 256
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 16
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 0.0001
data:
  cache_dir: /mnt/tb/data_cache
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.5
    stream_cap: 90000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.5
    stream_cap: 250000
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 1
  var_chunk:
  - 128
  - 512
  n_files: 6000
  stream_cap: 90000
training:
  seed: 0
  steps: 800
  grad_accum: 8
  amp: true
  init_from: /mnt/tb/checkpoints/farm/v2b_md256_s4/final.pt
  lr: 0.0001
  muon_lr: 0.00024
  muon_ref_mem_dim: 64
  warmup_steps: 20
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: false
  log_every: 10
  eval_every: 100
  eval_convs: 8
  eval_depths:
  - 2
  - 4
  - 6
  - 8
  eval_depth_convs: 8
  save_every: 400
  save_dir: /mnt/tb/checkpoints/farm/v2e_md256
  metrics_file: /mnt/tb/runs/farm_v2e_md256/metrics.jsonl
  interleave_files:
  - 2
  - 4
teacher:
  enabled: false
