# v350_phase1_10b — LA run phase 1 du 350M (voie C, curriculum 2 phases) : la
# masse des tokens en recette v2b_mix BATCHÉE (chunks fixes, AUCUN flag de
# stack), 10B tokens sur 8x A100 80GB SXM4 (deal Vast id 44773580, ~$1.11/GPU/h,
# ~24-27h, ~$210-250). Jumeau à l'échelle du twin 97M validé (v350_curr_p1,
# FINDINGS 2026-07-16 : curriculum warm-restart VERT). Phase 2 = continued
# full-stack B=1 var_chunk + cascade (config à venir, précédent v350_curr_p2).
#
# LANCEMENT (DDP manuel, commit 3675d94) :
#   torchrun --nproc_per_node=8 -m deepseek_v4_mini.code_defer_native \
#     deepseek_v4_mini/configs/v350_phase1_10b.yaml
#   Mono-GPU (debug) : python -m deepseek_v4_mini.code_defer_native <ce yaml>
#
# DONNÉES : pool ~2.4B tokens uniques (≈4 époques sur 10B — le tirage est avec
# remise, les poids du mix restent exacts quelle que soit la taille des pools).
# PRÉBUILD OBLIGATOIRE avant le pod (scripts/farm/prebuild_data.py sur server0,
# cache uint16 ≈ 5 GB) puis tar → HF privé → untar dans /workspace/data_cache
# au boot. the-stack (full, PAS smol) est GATED : token HF requis au prébuild.
#
# DIMENSIONNEMENT (validé pod 8xA100 2026-07-17, contrats 45123153+45132091) :
# W8 x B32 x G1 = 256 convs/step, m moyen ~3.9 => ~510-550k tokens/step =>
# 19600 steps ≈ 10B. Croisière mesurée 5.4 s/step (B32+GC+compile+depth_sync)
# => ~28-30h ≈ $260-280 sur la 44773580. Empilement des gains : depth_sync
# (straggler 2.6x tué), grad_checkpoint (B6 sans GC = OOM), compile (+5%
# vitesse, -29% mem alloc => c'est lui qui paie B32), B24->B32 gratuit (host-
# bound : 8 boucles data single-core à 99%). IMAGE : pytorch/pytorch:2.6.0-
# cuda12.4-cudnn9-devel MINIMUM — torch 2.5.1 = CheckpointError compile+GC
# (pytorch #166926, fix dynamic=False insuffisant sur 2.5). LR inchangé
# 3e-4/7.5e-4 (batch 550k tokens = zone standard 350M, NaN-recipe caps) ;
# anneal teacher = proportion twin ~15-22% des steps.
tokenizer: HuggingFaceTB/SmolLM2-135M

model:                                     # = v350_bringup / v350_curr (386M)
  d_model: 768
  n_layers: 12
  n_heads: 12
  d_head: 64
  dropout: 0.0
  max_seq_len: 640
  n_hc: 2
  sinkhorn_iters: 20
  csa_m: 4
  hca_m: 16
  top_k_csa: 8
  n_win: 16
  d_latent_q: 64
  n_groups: 2
  n_experts: 4
  n_shared: 1
  top_k_experts: 2
  d_ff: 1536
  mem_dim: 512
  max_mem: 8
  mem_seed_slots: 4
  mem_read_rank: 8                         # r*d constant (piège Muon sqrt(cols))
  mem_read_swiglu: true
  use_dual_stream: true
  balance_loss_weight: 1.0e-4

data:
  cache_dir: /workspace/data_cache
  # Mix divmix officiel (poids IDENTIQUES au job 107 / v350_curr_p1) ; seuls
  # changent les pools (n_files par source ~ poids x 2.4B / tokens-par-fichier)
  # et les stack_* qui passent de the-stack-smol (10k fichiers/langue, trop
  # petit) à bigcode/the-stack full (gated). stream_cap ~ n_files / taux de
  # rétention (min_chunks=2 jette ~70-80% du web court).
  sources:
  - name: codeparrot
    dataset: codeparrot/codeparrot-clean
    weight: 0.20
    n_files: 90000
    stream_cap: 150000
  - name: stack_c
    dataset: bigcode/the-stack
    data_dir: data/c
    weight: 0.06
    min_chunks: 2
    n_files: 60000
    stream_cap: 200000
  - name: stack_rust
    dataset: bigcode/the-stack
    data_dir: data/rust
    weight: 0.06
    min_chunks: 2
    n_files: 60000
    stream_cap: 200000
  - name: stack_js
    dataset: bigcode/the-stack
    data_dir: data/javascript
    weight: 0.06
    min_chunks: 2
    n_files: 60000
    stream_cap: 200000
  - name: stack_sql
    dataset: bigcode/the-stack
    data_dir: data/sql
    weight: 0.04
    min_chunks: 2
    n_files: 40000
    stream_cap: 150000
  - name: stack_html
    dataset: bigcode/the-stack
    data_dir: data/html
    weight: 0.04
    min_chunks: 2
    n_files: 40000
    stream_cap: 150000
  - name: stack_css
    dataset: bigcode/the-stack
    data_dir: data/css
    weight: 0.04
    min_chunks: 2
    n_files: 40000
    stream_cap: 150000
  - name: fineweb
    dataset: HuggingFaceFW/fineweb
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.10
    n_files: 140000
    stream_cap: 1200000
  - name: fineweb_edu
    dataset: HuggingFaceFW/fineweb-edu
    config_name: sample-10BT
    content_key: text
    min_chunks: 2
    weight: 0.08
    n_files: 110000
    stream_cap: 1000000
  - name: wikipedia
    dataset: wikimedia/wikipedia
    config_name: 20231101.en
    content_key: text
    min_chunks: 2
    weight: 0.08
    n_files: 130000
    stream_cap: 900000
  - name: finemath
    dataset: HuggingFaceTB/finemath
    config_name: finemath-4plus
    content_key: text
    min_chunks: 2
    weight: 0.08
    n_files: 130000
    stream_cap: 800000
  - name: khanacademy                      # subset ~24k docs : pool court, le
    dataset: HuggingFaceTB/cosmopedia      # poids 0.04 reste exact (remise)
    config_name: khanacademy
    content_key: text
    min_chunks: 2
    weight: 0.04
    n_files: 24000
    stream_cap: 40000
  - name: openstax
    dataset: HuggingFaceTB/cosmopedia
    config_name: openstax
    content_key: text
    min_chunks: 2
    weight: 0.06
    n_files: 100000
    stream_cap: 200000
  - name: arxiv                            # dataset à script (mort en datasets>=4)
    dataset: armanc/scientific_papers      # => branche parquet auto-convertie
    data_dir: arxiv                        # (partielle : ~150k articles, assez)
    revision: refs/convert/parquet
    content_key: article
    min_chunks: 2
    weight: 0.06
    n_files: 25000
    stream_cap: 60000
  depth_sync: true                         # DDP : m identique sur les 8 rangs par
                                           # step (sinon straggler ~2.6x mesuré)
  seq_len: 512
  chunks_per_conv: 8
  defer_len: 16
  batch_size: 32                           # par GPU (B32+GC+compile : 69.5G/80 réservés, validé pod 2026-07-17)
  n_files: 1000000                         # inutilisé (n_files épinglé par source)
  stream_cap: 90000
  # PAS de var_chunk : phase 1 = chunks fixes (le chemin batché v2b_mix) ;
  # var_chunk arrive en phase 2 (continued, batch=1), précédent v2b_mix -> v2c.

training:
  seed: 0                                  # shard DDP = seed + 9973*rank (trainer)
  steps: 19600
  grad_accum: 1
  amp: true
  # PAS d'init_from : la phase 1 EST le from-scratch (batché).
  lr: 3.0e-04
  muon_lr: 7.5e-04
  muon_ref_mem_dim: 64
  warmup_steps: 400
  weight_decay: 0.01
  grad_clip: 1.0
  defer_weight: 1.0
  wsd_decay: true
  wsd_floor: 0.0
  wsd_decay_start: 11800                   # 60% (convention DeepSeek, shape step)
  wsd_decay_shape: step
  tf32: true                               # +17% tok/s mesuré A100, opt-in validé
  grad_checkpoint: true                    # OBLIGATOIRE a 386M (B6 sans GC = OOM step 1)
  compile: true                            # torch>=2.6 requis (2.5.1 = CheckpointError) ; +5% vitesse, -29% mem
  skip_final_eval: true                    # pas d'éval bloquante à step==steps
  log_every: 20
  eval_every: 500
  eval_convs: 8
  eval_depths:
  - 2
  - 4
  - 6
  - 8
  eval_depth_convs: 8
  eval_depth_sources:                      # courbe par profondeur : ancres seules
  - codeparrot
  - fineweb
  save_every: 500                          # ~45 min entre checkpoints (5.4 s/step)
  save_dir: /workspace/checkpoints/v350_phase1_10b
  metrics_file: /workspace/runs/v350_phase1_10b/metrics.jsonl
  # AUCUN flag de stack : pas d'interleave, pas de no_reset, pas d'addr,
  # pas de reach, pas de cascade — c'est la définition de la phase 1.

teacher:
  enabled: true                            # recette from-scratch (kick du read)
  distill_weight: 2.0
  anneal:                                  # ~15-22% des steps = proportion twin
  - 2850
  - 4300
