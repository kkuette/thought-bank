<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8A24B"/>
      <stop offset="1" stop-color="#D96C4F"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0.5 L7.5 4 L0 7.5" fill="none" stroke="#8C93A8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrA" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0.5 L7.5 4 L0 7.5" fill="none" stroke="#E8A24B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrT" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0.5 L7.5 4 L0 7.5" fill="none" stroke="#56B8AC" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- a page with text lines; reused at every scale (the fractal joke is structural) -->
    <g id="page">
      <rect x="0" y="0" width="34" height="44" rx="4" fill="none" stroke="#8C93A8" stroke-width="2"/>
      <line x1="7" y1="10" x2="27" y2="10" stroke="#8C93A8" stroke-width="2" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="27" y2="18" stroke="#8C93A8" stroke-width="2" stroke-linecap="round"/>
      <line x1="7" y1="26" x2="21" y2="26" stroke="#8C93A8" stroke-width="2" stroke-linecap="round"/>
      <line x1="7" y1="34" x2="24" y2="34" stroke="#8C93A8" stroke-width="2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- ── wordmark: nested self-similar squares ─────────────────────────── -->
  <g transform="translate(64,46)">
    <rect x="0" y="0" width="64" height="64" rx="10" fill="none" stroke="url(#amber)" stroke-width="3.5"/>
    <rect x="14" y="14" width="40" height="40" rx="7" fill="none" stroke="url(#amber)" stroke-width="2.6" opacity="0.75"/>
    <rect x="24" y="24" width="24" height="24" rx="5" fill="none" stroke="url(#amber)" stroke-width="2" opacity="0.55"/>
    <rect x="31" y="31" width="12" height="12" rx="3" fill="none" stroke="url(#amber)" stroke-width="1.6" opacity="0.4"/>
    <rect x="35" y="35" width="5" height="5" rx="1.5" fill="url(#amber)" opacity="0.5"/>
  </g>
  <text x="152" y="90" font-size="44" font-weight="700" letter-spacing="10" fill="url(#amber)">FRACTALE</text>
  <text x="154" y="122" font-size="17" fill="#8C93A8" letter-spacing="0.3">a memory of wholes within wholes — the model writes its own notes, and thinks through them</text>

  <!-- ── left: the document, read page by page ─────────────────────────── -->
  <g transform="translate(64,196)">
    <text x="0" y="-16" font-size="14" fill="#8C93A8" letter-spacing="1.5">DOCUMENT · read page by page</text>
    <use href="#page" transform="translate(0,14) scale(1.5)"/>
    <use href="#page" transform="translate(66,14) scale(1.5)"/>
    <use href="#page" transform="translate(132,14) scale(1.5)"/>
    <text x="205" y="58" font-size="26" fill="#8C93A8" opacity="0.7">…</text>
    <!-- never re-read -->
    <text x="0" y="112" font-size="13" fill="#8C93A8" opacity="0.8" font-style="italic">never re-read — one page in the window at a time</text>
  </g>

  <!-- pages → model -->
  <path d="M 320 250 H 392" fill="none" stroke="#8C93A8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── centre: the model ─────────────────────────────────────────────── -->
  <g transform="translate(400,186)">
    <rect x="0" y="0" width="200" height="128" rx="14" fill="none" stroke="#8C93A8" stroke-width="2.5"/>
    <text x="100" y="34" font-size="17" font-weight="600" fill="#8C93A8" text-anchor="middle">Fractale 350M</text>
    <!-- the fast-weight layers: teal = machinery grown from the notes -->
    <line x1="26" y1="56"  x2="174" y2="56"  stroke="#8C93A8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="26" y1="74"  x2="174" y2="74"  stroke="#56B8AC" stroke-width="3" stroke-linecap="round"/>
    <line x1="26" y1="92"  x2="174" y2="92"  stroke="#8C93A8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="26" y1="110" x2="174" y2="110" stroke="#56B8AC" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- write: model → bank -->
  <path d="M 608 250 H 678" fill="none" stroke="#E8A24B" stroke-width="2.2" marker-end="url(#arrA)"/>
  <text x="643" y="238" font-size="12.5" fill="#E8A24B" text-anchor="middle">write</text>
  <!-- read: bank → model (loop under) -->
  <path d="M 700 322 C 700 360, 500 372, 500 322" fill="none" stroke="#56B8AC" stroke-width="2.2" marker-end="url(#arrT)"/>
  <text x="600" y="382" font-size="12.5" fill="#56B8AC" text-anchor="middle">read — the memory becomes part of the forward pass</text>

  <!-- ── right: the bank, 8 self-written notes ─────────────────────────── -->
  <g transform="translate(686,176)">
    <text x="0" y="-6" font-size="14" fill="#8C93A8" letter-spacing="1.5">THE BANK · 8 self-written notes</text>
    <text x="0" y="14" font-size="12.5" fill="#8C93A8" opacity="0.8" font-style="italic">each note: a whole document, in miniature</text>
    <!-- two rows of four slots; each slot contains the SAME page motif, smaller -->
    <g transform="translate(0,28)">
      <!-- row 1 : oldest first, slot 1 being evicted -->
      <g opacity="0.32">
        <rect x="0" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2" stroke-dasharray="5 5"/>
        <use href="#page" transform="translate(13,8) scale(0.82)"/>
      </g>
      <g>
        <rect x="64" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(77,8) scale(0.82)"/>
      </g>
      <g>
        <rect x="128" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(141,8) scale(0.82)"/>
      </g>
      <g>
        <rect x="192" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(205,8) scale(0.82)"/>
      </g>
      <!-- row 2 -->
      <g transform="translate(0,64)">
        <rect x="0" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(13,8) scale(0.82)"/>
        <rect x="64" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(77,8) scale(0.82)"/>
        <rect x="128" y="0" width="54" height="54" rx="9" fill="none" stroke="#E8A24B" stroke-width="2.2"/>
        <use href="#page" transform="translate(141,8) scale(0.82)"/>
        <!-- newest slot: freshly written, filled -->
        <rect x="192" y="0" width="54" height="54" rx="9" fill="url(#amber)" opacity="0.18" stroke="#E8A24B" stroke-width="2.6"/>
        <use href="#page" transform="translate(205,8) scale(0.82)"/>
      </g>
    </g>
    <text x="27" y="180" font-size="12" fill="#8C93A8" opacity="0.8" text-anchor="middle">oldest fades</text>
    <text x="219" y="180" font-size="12" fill="#E8A24B" text-anchor="middle">newest note</text>
  </g>

  <!-- footer: the state in your hand -->
  <text x="1136" y="86" font-size="13" fill="#8C93A8" text-anchor="end" font-style="italic">a few kilobytes — save it, restore it, swap it</text>
</svg>
