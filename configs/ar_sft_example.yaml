# AR SFT training configuration (YAML)

# Data
# Choose one of: dataset_preset OR (dataset + dataset_config + text_field)
dataset_preset: codesearchnet-python
# dataset: code_search_net
# dataset_config: python
# text_field: func_code_string

# Output
output_dir: outputs/ar_sft_yaml

# Tokenizer
tokenizer_name: Qwen/Qwen2.5-0.5B
think_token_text: "<think>"

# Model dims
d_model: 256
n_layers: 6
n_heads: 4
d_ff: 1024
thought_dim: 32
max_seq_len: 2048
max_thoughts: 8

# Training
batch_size: 1
lr: 1e-4
epochs: 1
gradient_accumulation_steps: 1
logging_steps: 1
save_steps: 100
eval_steps: 20
gradient_checkpointing: true

# LR schedule and optimizer
weight_decay: 0.1
lr_scheduler_type: cosine
warmup_ratio: 0.0
optim: adamw_torch
adam_beta1: 0.9
adam_beta2: 0.95
max_grad_norm: 1.0

# Generation metrics logging (eval/train)
log_thinking_on_eval: true
log_thought_trace_on_eval: true
log_thinking_on_train_every: 1
log_thought_trace_on_train: true

# Generation settings used by the callbacks
gen_samples: 2
gen_max_new_tokens: 128
gen_max_new_thoughts: 100
gen_temperature: 1.0
gen_top_k: 0

# Encourage using the <think> token during generation
think_logit_bias: 3.0
min_thoughts_first: 10

